<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakdown Maintenance Log</title>
<style>
  :root {
    --primary: #0078D4;
    --primary-dark: #005A9E;
    --bg: #F5F5F5;
    --card-bg: #FFFFFF;
    --text: #333333;
    --text-light: #666666;
    --border: #E0E0E0;
    --success: #107C10;
    --danger: #D83B01;
    --row-alt: #F9F9F9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-icon { font-size: 32px; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 2px; }

  /* ── Container ── */
  .container {
    max-width: 960px;
    margin: 24px auto;
    padding: 0 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 28px 32px;
    margin-bottom: 24px;
  }
  .card-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Form Grid ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 24px;
  }
  .form-group { display: flex; flex-direction: column; }
  .form-group.full { grid-column: 1 / -1; }

  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .form-group label .required {
    color: var(--danger);
    margin-left: 2px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #fff;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0,120,212,0.15);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .duration-display {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: #F0F6FF;
    color: var(--primary);
    font-weight: 600;
    min-height: 42px;
    display: flex;
    align-items: center;
  }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    justify-content: flex-end;
  }
  .btn {
    padding: 11px 28px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-success {
    background: var(--success);
    color: #fff;
  }
  .btn-success:hover { background: #0B5E0B; transform: translateY(-1px); }
  .btn-outline {
    background: #fff;
    color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-outline:hover { background: var(--bg); }
  .btn-danger {
    background: var(--danger);
    color: #fff;
  }
  .btn-danger:hover { background: #A52C00; }

  /* ── Table ── */
  .table-wrapper {
    overflow-x: auto;
    margin-top: 12px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--primary);
    color: #fff;
    padding: 10px 12px;
    text-align: center;
    font-weight: 600;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  tbody td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  tbody tr:hover { background: #E8F4FD; }
  .no-data {
    text-align: center;
    padding: 40px;
    color: var(--text-light);
    font-size: 14px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--success);
    color: #fff;
    padding: 14px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.4s ease;
    z-index: 1000;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Badge ── */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-conv { background: #E3F2FD; color: #1565C0; }
  .badge-asrs { background: #F3E5F5; color: #7B1FA2; }
  .badge-elec { background: #FFF3E0; color: #E65100; }
  .badge-util { background: #E8F5E9; color: #2E7D32; }
  .badge-other { background: #F5F5F5; color: #616161; }

  /* ── Stats ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    text-align: center;
  }
  .stat-card .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
  }
  .stat-card .stat-label {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
  }

  /* ── Delete btn ── */
  .btn-del {
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .btn-del:hover { background: #FDE8E0; }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .header { padding: 18px 16px; }
    .card { padding: 20px 16px; }
    .btn-row { flex-direction: column; }
    .btn { justify-content: center; }
  }

  /* ── Print ── */
  @media print {
    body { background: #fff; }
    .header { background: #333 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .card { box-shadow: none; border: 1px solid #ddd; }
    .btn-row, .btn-del, #formCard { display: none !important; }
    .stats-row { break-inside: avoid; }
    thead th { background: #333 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<!-- ═══ Header ═══ -->
<div class="header">
  <div class="header-icon">🔧</div>
  <div>
    <h1>Breakdown Maintenance Log</h1>
    <p>설비 고장 정비 이력 관리 시스템</p>
  </div>
</div>

<div class="container">

  <!-- ═══ Stats ═══ -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-label">총 건수</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statMonth">0</div>
      <div class="stat-label">이번 달</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statAvgDur">-</div>
      <div class="stat-label">평균 소요시간</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statTopEquip">-</div>
      <div class="stat-label">최다 고장 설비</div>
    </div>
  </div>

  <!-- ═══ Input Form ═══ -->
  <div class="card" id="formCard">
    <div class="card-title">📝 정비 이력 입력</div>
    <form id="bdForm">
      <div class="form-grid">
        <!-- Row 1 -->
        <div class="form-group">
          <label>날짜 <span class="required">*</span></label>
          <input type="date" id="fDate" required>
        </div>
        <div class="form-group">
          <label>설비 (Equipment) <span class="required">*</span></label>
          <select id="fEquip" required>
            <option value="">-- 선택 --</option>
            <option value="CONVEYOR">CONVEYOR</option>
            <option value="ASRS">ASRS</option>
            <option value="ELECTRICAL">ELECTRICAL</option>
            <option value="UTILITY">UTILITY</option>
            <option value="OTHER">OTHER</option>
          </select>
        </div>

        <!-- Row 2 -->
        <div class="form-group">
          <label>시작시간 <span class="required">*</span></label>
          <input type="time" id="fStart" required>
        </div>
        <div class="form-group">
          <label>종료시간 <span class="required">*</span></label>
          <input type="time" id="fEnd" required>
        </div>

        <!-- Row 3 -->
        <div class="form-group">
          <label>소요시간 (자동계산)</label>
          <div class="duration-display" id="fDuration">시작/종료 시간을 입력하세요</div>
        </div>
        <div class="form-group">
          <label>사용자재 (Parts Used)</label>
          <input type="text" id="fParts" placeholder="예: Belt, Bearing, Fuse 등">
        </div>

        <!-- Row 4 -->
        <div class="form-group full">
          <label>현상 (Symptom) <span class="required">*</span></label>
          <textarea id="fSymptom" placeholder="고장 현상을 상세히 기술하세요" required></textarea>
        </div>

        <!-- Row 5 -->
        <div class="form-group full">
          <label>조치방법 (Action Taken) <span class="required">*</span></label>
          <textarea id="fAction" placeholder="조치 내용을 상세히 기술하세요" required></textarea>
        </div>
      </div>

      <div class="btn-row" style="margin-top:20px;">
        <button type="button" class="btn btn-outline" onclick="resetForm()">↻ 초기화</button>
        <button type="submit" class="btn btn-primary">✚ 이력 등록</button>
      </div>
    </form>
  </div>

  <!-- ═══ Records Table ═══ -->
  <div class="card">
    <div class="card-title" style="justify-content:space-between;">
      <span>📋 정비 이력 목록</span>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-success" onclick="exportExcel()" style="padding:7px 16px; font-size:13px;">
          📥 Excel 다운로드
        </button>
        <button class="btn btn-danger" onclick="clearAll()" style="padding:7px 16px; font-size:13px;">
          🗑 전체 삭제
        </button>
      </div>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>No.</th>
            <th>날짜</th>
            <th>설비</th>
            <th>시작</th>
            <th>종료</th>
            <th>소요시간</th>
            <th>현상</th>
            <th>조치방법</th>
            <th>사용자재</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="10" class="no-data">등록된 이력이 없습니다</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast">✅ 이력이 등록되었습니다</div>

<!-- ═══ SheetJS CDN ═══ -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<script>
// ── Data Store (localStorage) ──
const STORAGE_KEY = 'bd_maintenance_log';

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

// ── Duration Calc ──
const fStart = document.getElementById('fStart');
const fEnd = document.getElementById('fEnd');
const fDuration = document.getElementById('fDuration');

function calcDuration() {
  if (!fStart.value || !fEnd.value) {
    fDuration.textContent = '시작/종료 시간을 입력하세요';
    return '';
  }
  const [sh, sm] = fStart.value.split(':').map(Number);
  const [eh, em] = fEnd.value.split(':').map(Number);
  let diff = (eh * 60 + em) - (sh * 60 + sm);
  if (diff < 0) diff += 1440; // overnight
  const h = Math.floor(diff / 60);
  const m = diff % 60;
  const txt = h > 0 ? h + '시간 ' + m + '분' : m + '분';
  fDuration.textContent = txt + ' (' + diff + 'min)';
  return txt;
}
fStart.addEventListener('change', calcDuration);
fEnd.addEventListener('change', calcDuration);

// ── Equipment Badge ──
function equipBadge(eq) {
  const map = {
    'CONVEYOR': 'badge-conv',
    'ASRS': 'badge-asrs',
    'ELECTRICAL': 'badge-elec',
    'UTILITY': 'badge-util',
    'OTHER': 'badge-other'
  };
  return '<span class="badge ' + (map[eq]||'badge-other') + '">' + eq + '</span>';
}

// ── Render Table ──
function renderTable() {
  const records = loadRecords();
  const tbody = document.getElementById('tableBody');

  if (records.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="no-data">등록된 이력이 없습니다</td></tr>';
  } else {
    tbody.innerHTML = records.map((r, i) =>
      '<tr>' +
        '<td>' + (i+1) + '</td>' +
        '<td>' + r.date + '</td>' +
        '<td>' + equipBadge(r.equip) + '</td>' +
        '<td>' + r.start + '</td>' +
        '<td>' + r.end + '</td>' +
        '<td>' + r.duration + '</td>' +
        '<td style="text-align:left;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="' + escHtml(r.symptom) + '">' + escHtml(r.symptom) + '</td>' +
        '<td style="text-align:left;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="' + escHtml(r.action) + '">' + escHtml(r.action) + '</td>' +
        '<td>' + escHtml(r.parts || '-') + '</td>' +
        '<td><button class="btn-del" onclick="deleteRecord(' + i + ')">✕</button></td>' +
      '</tr>'
    ).join('');
  }
  updateStats(records);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Stats ──
function updateStats(records) {
  document.getElementById('statTotal').textContent = records.length;

  const now = new Date();
  const ym = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const monthCount = records.filter(r => r.date.substring(0,7) === ym).length;
  document.getElementById('statMonth').textContent = monthCount;

  if (records.length > 0) {
    const totalMin = records.reduce((sum, r) => {
      const m = r.durationMin || 0;
      return sum + m;
    }, 0);
    const avg = Math.round(totalMin / records.length);
    document.getElementById('statAvgDur').textContent = avg + 'min';

    // Top equipment
    const freq = {};
    records.forEach(r => { freq[r.equip] = (freq[r.equip]||0) + 1; });
    const top = Object.entries(freq).sort((a,b) => b[1]-a[1])[0];
    document.getElementById('statTopEquip').textContent = top[0];
  } else {
    document.getElementById('statAvgDur').textContent = '-';
    document.getElementById('statTopEquip').textContent = '-';
  }
}

// ── Form Submit ──
document.getElementById('bdForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const dur = calcDuration();
  if (!dur) { alert('시작시간과 종료시간을 입력하세요'); return; }

  // calc minutes
  const [sh, sm] = fStart.value.split(':').map(Number);
  const [eh, em] = document.getElementById('fEnd').value.split(':').map(Number);
  let diff = (eh*60+em) - (sh*60+sm);
  if (diff < 0) diff += 1440;

  const record = {
    date: document.getElementById('fDate').value,
    equip: document.getElementById('fEquip').value,
    start: fStart.value,
    end: document.getElementById('fEnd').value,
    duration: dur,
    durationMin: diff,
    symptom: document.getElementById('fSymptom').value.trim(),
    action: document.getElementById('fAction').value.trim(),
    parts: document.getElementById('fParts').value.trim()
  };

  const records = loadRecords();
  records.push(record);
  saveRecords(records);
  renderTable();
  resetForm();
  showToast('✅ 이력이 등록되었습니다');
});

function resetForm() {
  document.getElementById('bdForm').reset();
  fDuration.textContent = '시작/종료 시간을 입력하세요';
  // Set today
  document.getElementById('fDate').valueAsDate = new Date();
}

function deleteRecord(idx) {
  if (!confirm('이 이력을 삭제하시겠습니까?')) return;
  const records = loadRecords();
  records.splice(idx, 1);
  saveRecords(records);
  renderTable();
  showToast('🗑 이력이 삭제되었습니다');
}

function clearAll() {
  if (!confirm('전체 이력을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
  saveRecords([]);
  renderTable();
  showToast('🗑 전체 이력이 삭제되었습니다');
}

// ── Excel Export ──
function exportExcel() {
  const records = loadRecords();
  if (records.length === 0) { alert('다운로드할 데이터가 없습니다'); return; }

  const data = records.map((r, i) => ({
    'No.': i + 1,
    '날짜': r.date,
    '설비': r.equip,
    '시작시간': r.start,
    '종료시간': r.end,
    '소요시간': r.duration,
    '소요시간(분)': r.durationMin,
    '현상': r.symptom,
    '조치방법': r.action,
    '사용자재': r.parts || ''
  }));

  const ws = XLSX.utils.json_to_sheet(data);
  // Column widths
  ws['!cols'] = [
    {wch:5}, {wch:12}, {wch:14}, {wch:10}, {wch:10},
    {wch:14}, {wch:12}, {wch:30}, {wch:30}, {wch:20}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'BD_Maintenance_Log');
  XLSX.writeFile(wb, 'BD_Maintenance_Log_' + new Date().toISOString().slice(0,10) + '.xlsx');
  showToast('📥 Excel 파일이 다운로드되었습니다');
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──
document.getElementById('fDate').valueAsDate = new Date();
renderTable();
</script>
</body>
</html>
